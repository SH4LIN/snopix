name: Build Release Zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override. Defaults to the plugin header version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build WordPress.org-deployable zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            admin/app/package-lock.json
            public/app/package-lock.json

      - name: Resolve version
        id: resolve
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$OVERRIDE_VERSION" ]; then
            version="$OVERRIDE_VERSION"
          elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build zip
        id: build
        run: bash bin/build-zip.sh "${{ steps.resolve.outputs.version }}"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.zip_name }}
          path: ${{ steps.build.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip_path }}
          generate_release_notes: true
