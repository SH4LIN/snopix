name: Build Release Zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override. Defaults to the plugin header version.'
        required: false
        default: ''

permissions:
  contents: write

env:
  PLUGIN_SLUG: snopix

jobs:
  build:
    name: Build WordPress.org-deployable zip
    runs-on: ubuntu-latest
    outputs:
      zip_name: ${{ steps.build.outputs.zip_name }}
      zip_path: ${{ steps.build.outputs.zip_path }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            admin/app/package-lock.json
            public/app/package-lock.json
            admin/plugins-screen/package-lock.json

      - name: Resolve version
        id: resolve
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$OVERRIDE_VERSION" ]; then
            version="$OVERRIDE_VERSION"
          elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build zip
        id: build
        run: bash bin/build-zip.sh "${{ steps.resolve.outputs.version }}"

      - name: Verify zip excludes .wordpress-org
        env:
          ZIP_PATH: ${{ steps.build.outputs.zip_path }}
        run: |
          if unzip -l "$ZIP_PATH" | grep -E '(^|/)\.wordpress-org(/|$)'; then
            echo "::error::.wordpress-org leaked into the release zip"
            exit 1
          fi
          echo "OK: .wordpress-org is not in the zip."

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.zip_name }}
          path: ${{ steps.build.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip_path }}
          generate_release_notes: true

  deploy-wporg:
    name: Deploy to WordPress.org SVN
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: build

      - name: Unpack zip into deploy directory
        env:
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
          PLUGIN_SLUG: ${{ env.PLUGIN_SLUG }}
        run: |
          mkdir -p dist
          unzip -q "build/$ZIP_NAME" -d dist
          if [ ! -d "dist/$PLUGIN_SLUG" ]; then
            echo "::error::Expected dist/$PLUGIN_SLUG after unzip"
            exit 1
          fi

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2  # v2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ env.PLUGIN_SLUG }}
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_DIR: dist/${{ env.PLUGIN_SLUG }}
          ASSETS_DIR: .wordpress-org
