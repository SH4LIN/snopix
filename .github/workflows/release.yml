name: Build Release Zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version label appended to the zip name (e.g. 0.2.0). Defaults to plugin header version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build WordPress.org-deployable zip
    runs-on: ubuntu-latest

    env:
      PLUGIN_SLUG: pixel-scout
      STAGING_DIR: build/pixel-scout

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/app/package-lock.json

      - name: Install admin app dependencies
        working-directory: admin/app
        run: npm ci

      - name: Build admin app
        working-directory: admin/app
        run: npm run build

      - name: Resolve plugin version
        id: version
        env:
          OVERRIDE_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          header_version=$(grep -E "^\s*\*\s*Version:" pixel-scout.php | head -n1 | sed -E 's/.*Version:\s*//' | tr -d '\r' | xargs)
          if [ -n "$OVERRIDE_VERSION" ]; then
            version="$OVERRIDE_VERSION"
          elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$header_version"
          fi
          # Sanitise: only [A-Za-z0-9._-]
          version_safe=$(printf '%s' "$version" | tr -c 'A-Za-z0-9._-' '-')
          echo "version=$version_safe" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version_safe"

      - name: Stage plugin files
        run: |
          mkdir -p "$STAGING_DIR"
          rsync -a \
            --exclude-from=.distignore \
            --exclude="build" \
            ./ "$STAGING_DIR/"

      - name: Show staged tree (top two levels)
        run: |
          find "$STAGING_DIR" -maxdepth 2 -mindepth 1 | sort
          echo
          echo "Staged size:"
          du -sh "$STAGING_DIR"

      - name: Create zip
        id: zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          zip_name="${PLUGIN_SLUG}-${VERSION}.zip"
          (cd build && zip -rq "$zip_name" "$PLUGIN_SLUG")
          ls -la "build/$zip_name"
          echo "zip_path=build/$zip_name" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_path }}
          generate_release_notes: true
