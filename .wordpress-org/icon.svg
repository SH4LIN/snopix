<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    PIXEL SCOUT · Icon · Dark
    Aperture mark: six trapezoid blades, opacity-graded for rotational depth.
    Tile: #1d1d1f. Blades: #0071e3. Center hex anchor.
  -->
  <rect width="256" height="256" rx="56" fill="#1d1d1f"/>

  <g transform="translate(128 128)" fill="#0071e3">
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="1"/>
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="0.85" transform="rotate(60)"/>
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="0.7"  transform="rotate(120)"/>
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="0.55" transform="rotate(180)"/>
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="0.7"  transform="rotate(240)"/>
    <polygon points="23.6,-11.0 72.5,-33.8 72.5,33.8 23.6,11.0" opacity="0.85" transform="rotate(300)"/>
  </g>

  <polygon
    points="128,108 145.32,118 145.32,138 128,148 110.68,138 110.68,118"
    fill="#1d1d1f"
    stroke="#0071e3"
    stroke-width="1.5"
    stroke-opacity="0.35"/>
</svg>
